# general settings
name: WindHCT_ERA5toCERRA
model_type: SRModel
scale: 5 # 5x upscaling
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: ERA5toCERRA_V2
    type: NumpyPairedDataset
    dataroot_gt: datasets/ERA5toCERRA/train_hr_norm.npy # HR data path
    dataroot_lq: datasets/ERA5toCERRA/train_lr_norm.npy # LR data path
    filename_tmpl: '{}'
    io_backend:
      type: numpy
    gt_size: 255 # HR patch size
    use_hflip: false
    use_rot: false
    use_blur: false
    # data loader
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ERA5toCERRA_V2
    type: NumpyPairedDataset
    dataroot_gt: datasets/ERA5toCERRA/val_hr_norm.npy
    dataroot_lq: datasets/ERA5toCERRA/val_lr_norm.npy
    norm_path: datasets/ERA5toCERRA/manifest_train_scalers.npz
    io_backend:
      type: numpy

network_g:
  type: WindHCT
  num_in_ch: 1
  num_out_ch: 1
  num_feat: 64
  window_size: 17
  num_group: 6
  num_block: 6
  num_heads: 4
  mlp_ratio: 4.0
  drop_prob: 0.1
  img_range: 1.0
  rgb_mean: [0.0]
  upscale: 5

# path
path:
  experiments_root: experiments/SCIE
  pretrain_network_g: ~ # no pretrained model
  strict_load_g: false
  resume_state: ~ # start training from scratch

train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [35000, 43000, 48000]  # based on total_iter = 50000
    gamma: 0.5

  total_iter: 50000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

val:
  val_freq: !!float 1800
  save_img: true

  metrics:
    rmse: # metric name, can be arbitrary
      type: calculate_rmse
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1800
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
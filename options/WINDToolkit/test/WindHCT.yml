name: WindHCT_WINDToolkit
suffix: ~  # add suffix to saved images
model_type: SRModel
scale: 5
crop_border: ~  # crop border when evaluation. If None, crop the scale pixels
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 10

datasets:
  test_1:  # the 1st test dataset
    name: WindToolkit
    type: NumpyPairedDataset
    dataroot_gt: datasets/WINDToolkit/test_hr_norm.npy
    dataroot_lq: datasets/WINDToolkit/test_lr_norm.npy
    norm_path: datasets/WINDToolkit/hr_stats.npz
    io_backend:
      type: numpy

# network structures
network_g:
  type: WindHCT
  num_in_ch: 1
  num_out_ch: 1
  num_feat: 64
  window_size: 5
  num_heads: 4
  mlp_ratio: 4.0
  drop_prob: 0.1
  num_group: 6
  num_block: 6
  img_range: 1.0
  rgb_mean: [0.0]
  upscale: 5

save_img: true

# path
path:
  pretrain_network_g: experiments/pretrained_models/WindHCT_WINDToolkit.pth
  strict_load_g: true
  npy_results: ./results/npy_results  # path for saving raw SR output as .npy
  gt_visualization: ./results/gt_visualization

# validation settings
val:
  save_img: true
  save_npy: true  # set false to skip saving .npy output
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: {}
    ssim: {}
    rmse: {}
    mae: {}